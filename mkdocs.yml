site_name: geointerpo
site_description: Python spatial interpolation toolkit — boundaries, point data, 15 methods, raster export, validation
site_author: Ali Rezaie
site_url: https://homayounrezaie.github.io/geonterpo
repo_url: https://github.com/homayounrezaie/geonterpo
repo_name: homayounrezaie/geonterpo
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Boundaries: boundaries.md
  - Pipeline: pipeline.md
  - Methods: interpolators.md
  - Examples: examples.md
  - FAQ: faq.md
  - API:
      - Interpolators: api/interpolators.md
      - Data Sources: api/sources.md
      - Validation: api/validation.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/homayounrezaie/geonterpo
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/geointerpo/
