site_name: geointerpo
site_description: Python spatial interpolation toolkit — boundaries, point data, 15 methods, raster export, validation
site_author: Ali Rezaie
site_url: https://homayounrezaie.github.io/geonterpo
repo_url: https://github.com/homayounrezaie/geonterpo
repo_name: homayounrezaie/geonterpo
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Get Started:
      - Install: install.md
      - Quickstart: quickstart.md
  - Guide:
      - Boundaries: boundaries.md
      - Pipeline: pipeline.md
      - Methods: interpolators.md
      - Examples: examples.md
  - API:
      - Interpolators: api/interpolators.md
      - Data Sources: api/sources.md
      - Validation: api/validation.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/homayounrezaie/geonterpo
      name: GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/geointerpo/
      name: PyPI
